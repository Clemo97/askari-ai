name: AskariAI
options:
  bundleIdPrefix: com.askari
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: AskariAI
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: YES
    DEVELOPMENT_TEAM: ""           # Fill in your team ID before archiving
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only

packages:
  PowerSync:
    url: https://github.com/powersync-ja/powersync-swift
    from: "1.0.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.17.0"
  Cactus:
    url: https://github.com/mhayes853/swift-cactus
    from: "2.0.0"

targets:
  AskariAI:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    info:
      path: AskariAI/Resources/Info.plist
      properties:
        CFBundleDisplayName: Askari AI
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: "Used for voice incident logging in the field — all processing happens on-device."
        NSLocationWhenInUseUsageDescription: "Used to track patrol GPS route during active missions."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Used to track patrol GPS route during active missions."
        UIBackgroundModes:
          - location
          - processing

    entitlements:
      path: AskariAI/Resources/AskariAI.entitlements
      properties:
        com.apple.security.application-groups: []

    sources:
      - path: AskariAI
        excludes:
          - "Resources/Info.plist"
          - "Resources/AskariAI.entitlements"

    resources:
      - path: AskariAI/Resources
        excludes:
          - "Info.plist"
          - "AskariAI.entitlements"

    dependencies:
      - package: PowerSync
        product: PowerSync
      - package: Supabase
        product: Supabase
      - package: ComposableArchitecture
        product: ComposableArchitecture
      - package: Cactus
        product: Cactus

    settings:
      base:
        INFOPLIST_FILE: AskariAI/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.askari.AskariAI
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        OTHER_SWIFT_FLAGS: -strict-concurrency=complete
